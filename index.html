      try {
        if (!window.firebase) {
          throw new Error("Firebase SDK 로드 실패");
        }
        const app = window.firebase.initializeApp(firebaseConfig);
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();
        let analytics = null;
        try {
          analytics = window.firebase.analytics();
        } catch {}

        const normalizeDocSnapshot = (snap) => {
          if (!snap || typeof snap !== "object") return snap;
          if (typeof snap.exists === "function") return snap;
          return {
            id: snap.id,
            ref: snap.ref,
            metadata: snap.metadata,
            exists: () => Boolean(snap.exists),
            data: (...args) => (typeof snap.data === "function" ? snap.data(...args) : undefined),
            get: (...args) => (typeof snap.get === "function" ? snap.get(...args) : undefined),
          };
        };
        const normalizeQuerySnapshot = (snap) => {
          if (!snap || typeof snap !== "object") return snap;
          return {
            docs: Array.isArray(snap.docs) ? snap.docs.map((docSnap) => normalizeDocSnapshot(docSnap)) : [],
          };
        };

        const methods = {
          onAuthStateChanged: (authRef, next, error) => authRef.onAuthStateChanged(next, error),
          signInWithEmailAndPassword: (authRef, email, password) =>
            authRef.signInWithEmailAndPassword(email, password),
          createUserWithEmailAndPassword: (authRef, email, password) =>
            authRef.createUserWithEmailAndPassword(email, password),
          sendPasswordResetEmail: (authRef, email) => authRef.sendPasswordResetEmail(email),
          signOut: (authRef) => authRef.signOut(),
          setPersistence: (authRef, persistence) => authRef.setPersistence(persistence),
          browserLocalPersistence: window.firebase.auth.Auth.Persistence.LOCAL,
          collection: (dbRef, name) => dbRef.collection(name),
          addDoc: (collectionRef, data) => collectionRef.add(data),
          updateDoc: (docRef, data) => docRef.update(data),
          deleteDoc: (docRef) => docRef.delete(),
          setDoc: (docRef, data, options) => docRef.set(data, options),
          getDoc: async (docRef) => normalizeDocSnapshot(await docRef.get()),
          doc: (dbRef, collectionName, id) => dbRef.collection(collectionName).doc(id),
          onSnapshot: (ref, next, error) =>
            ref.onSnapshot(
              (snap) => {
                if (snap && Array.isArray(snap.docs)) {
                  next(normalizeQuerySnapshot(snap));
                  return;
                }
                next(normalizeDocSnapshot(snap));
              },
              error
            ),
          orderBy: (field, direction = "asc") => (ref) => ref.orderBy(field, direction),
          limit: (count) => (ref) => ref.limit(count),
          query: (ref, ...constraints) =>
            constraints.reduce((acc, applyConstraint) => applyConstraint(acc), ref),
          serverTimestamp: () => window.firebase.firestore.FieldValue.serverTimestamp(),
        };

        window.FeeFirebase = {
          app,
          auth,
          db,
          analytics,
          methods,
        };
      } catch (error) {
        console.error("Firebase 초기화 실패", error);
        window.FeeFirebase = null;
      }
    </script>

              return String(a.organization || "").localeCompare(String(b.organization || ""), "ko");
            });
        }, [items, search, statusFilter, entityFilter, paymentDateFrom, paymentDateTo, dateSortOrder]);
        const totalPages = Math.max(1, Math.ceil(filteredItems.length / pageSize));
        const pagedItems = useMemo(() => {

        const riskItems = useMemo(() => {

              (item) =>
                item.status === "연체" ||

            )
            .sort((a, b) => (a.days ?? 9999) - (b.days ?? 9999));
        }, [items, settings.alertDaysBefore, settings.overdueGraceDays]);
        const getRiskType = (item) => {

        const filteredRiskItems = useMemo(() => {
          if (riskStatusFilter === "전체") return riskItems;
          return riskItems.filter((item) => getRiskType(item) === riskStatusFilter);
        }, [riskItems, riskStatusFilter, settings.approvalRequiredAmount]);
        const auditActionOptions = useMemo(() => {
          const set = new Set(auditLogs.map((log) => String(log.action || "").trim()).filter(Boolean));
          return ["전체", ...Array.from(set)];

        const filteredAuditLogs = useMemo(() => {
          if (auditActionFilter === "전체") return auditLogs;
          return auditLogs.filter((log) => String(log.action || "") === auditActionFilter);
        }, [auditLogs, auditActionFilter]);
        const cyclePatternAlerts = useMemo(() => {
          const groups = new Map();
          for (const item of items) {
            const organization = String(item.organization || "").trim() || "미지정 기관";
            const entity = String(item.entity || "").trim() || "미지정 사업장";
            const cycle = String(item.cycle || "").trim() || "기타";
            const step = getRecurringStep(cycle);
              const groupKey = [organization, entity, cycle].join("|");
              if (!groups.has(groupKey)) {
                groups.set(groupKey, {
                  groupKey,
                  organization,
                  entity,
                  cycle,
                  step,
                  monthKeys: new Set(),
              });
            }
            const monthKey = getDueMonthKey(item);
            if (monthKey !== null) groups.get(groupKey).monthKeys.add(monthKey);
          }

          const alerts = [];
          for (const group of groups.values()) {
            const monthKeys = [...group.monthKeys].sort((a, b) => a - b);
            if (monthKeys.length < 2) continue;
            for (let i = 1; i < monthKeys.length; i += 1) {
              const prev = monthKeys[i - 1];
              const curr = monthKeys[i];
              const gap = curr - prev;
              if (gap > group.step) {
                const missingCount = Math.floor((gap - 1) / group.step);
                alerts.push({
                  key: `${group.groupKey}|${prev}|${curr}|missing`,
                  type: "missing",
                  score: gap - group.step,
                  organization: group.organization,
                  entity: group.entity,
                  cycle: group.cycle,
                  gap,
                  expectedGap: group.step,
                  message: `${group.organization} · ${group.entity} · ${group.cycle}: ${monthKeyLabel(
                    prev
                  )} → ${monthKeyLabel(curr)} 간격이 ${gap}개월(기준 ${group.step}개월)로 ${missingCount}회 누락 가능`,
                });
              } else if (gap < group.step) {
                alerts.push({
                  key: `${group.groupKey}|${prev}|${curr}|duplicate`,
                  type: "duplicate",
                  score: group.step - gap,
                  organization: group.organization,
                  entity: group.entity,
                  cycle: group.cycle,
                  gap,
                  expectedGap: group.step,
                  message: `${group.organization} · ${group.entity} · ${group.cycle}: ${monthKeyLabel(
                    prev
                  )} → ${monthKeyLabel(curr)} 간격이 ${gap}개월(기준 ${group.step}개월)로 중복 가능`,
                });
              }
            }
          }

          return alerts.sort((a, b) => b.score - a.score).slice(0, 12);
        }, [items]);
        const visibleCyclePatternAlerts = useMemo(() => {
          if (!dismissedCycleAlertKeys.length) return cyclePatternAlerts;
          const dismissed = new Set(dismissedCycleAlertKeys);
          return cyclePatternAlerts.filter((alert) => !dismissed.has(alert.key));
        }, [cyclePatternAlerts, dismissedCycleAlertKeys]);
        const cycleAlertStats = useMemo(() => {
          return visibleCyclePatternAlerts.reduce(
            (acc, alert) => {
              if (alert.type === "missing") acc.missing += 1;
              if (alert.type === "duplicate") acc.duplicate += 1;
              return acc;
            },
            { missing: 0, duplicate: 0 }
          );
        }, [visibleCyclePatternAlerts]);
        const isAllCycleAlertsSelected =

        useEffect(() => {

        useEffect(() => {
          const visibleKeys = new Set(visibleCyclePatternAlerts.map((alert) => alert.key));
          setSelectedCycleAlertKeys((prev) => prev.filter((key) => visibleKeys.has(key)));
        }, [visibleCyclePatternAlerts]);
        useEffect(() => {
          const allAlertKeys = new Set(cyclePatternAlerts.map((alert) => alert.key));
          setDismissedCycleAlertKeys((prev) => prev.filter((key) => allAlertKeys.has(key)));
        }, [cyclePatternAlerts]);

        useEffect(() => {
          if (currentPage > totalPages) setCurrentPage(totalPages);
        }, [currentPage, totalPages]);

        const dataQuality = useMemo(() => {
          const duplicateMap = new Map();
          for (const item of items) {
            const key = [
              String(item.organization || "").trim().toLowerCase(),
              String(item.entity || "").trim().toLowerCase(),
              String(item.cycle || "").trim().toLowerCase(),
              String(item.recurringYear || "").trim(),
              String(item.recurringMonth || "").trim(),
              String(item.paymentDate || "").trim(),
              String(item.recurringOrder || "").trim(),
            ].join("|");
            if (!duplicateMap.has(key)) duplicateMap.set(key, []);
            duplicateMap.get(key).push(item);
          }
          const duplicates = [...duplicateMap.values()].filter((group) => group.length > 1);

          const categoryAverage = new Map();
          for (const item of items) {
            const cat = String(item.category || "");
            const prev = categoryAverage.get(cat) || { sum: 0, count: 0 };
            categoryAverage.set(cat, {
              sum: prev.sum + Number(item.amount || 0),
              count: prev.count + 1,
            });
          }
          const anomalies = items.filter((item) => {
            const stat = categoryAverage.get(String(item.category || ""));
            if (!stat || stat.count < 2) return false;
            const avg = stat.sum / stat.count;
            return avg > 0 && Number(item.amount || 0) > avg * 2;
          });

          return { duplicates, anomalies };
        }, [items]);

        const handleChange = (key, value) => {
          setForm((prev) => ({ ...prev, [key]: value }));
        };

        const resetForm = () => {
          setForm(emptyForm);
          setEditingId(null);
        };

        const parseSlipDate = (rawValue) => {
          if (rawValue === null || typeof rawValue === "undefined" || rawValue === "") return "";
          if (rawValue instanceof Date && !Number.isNaN(rawValue.getTime())) {
            return rawValue.toISOString().slice(0, 10);
          }
          const str = String(rawValue).trim();
          if (!str) return "";
          const digits = str.replace(/\D/g, "");
          if (digits.length === 8) {
            const yyyy = digits.slice(0, 4);
            const mm = digits.slice(4, 6);
            const dd = digits.slice(6, 8);
            const dateString = `${yyyy}-${mm}-${dd}`;
            const d = new Date(dateString);
            if (!Number.isNaN(d.getTime())) return dateString;
          }
          const fallback = new Date(str);
          if (!Number.isNaN(fallback.getTime())) return fallback.toISOString().slice(0, 10);
          return "";
        };

        const inferImportedCategory = (text) => {
          if (/학회/i.test(text)) return "학회";
          if (/협회|상공회의소|조합|무역협회/i.test(text)) return "협회";
          if (/후원|재단/i.test(text)) return "후원단체";
          if (/기관|공사|센터/i.test(text)) return "유관기관";
          return "기타";
        };

        const splitChunks = (arr, size) => {
          const chunks = [];
          for (let i = 0; i < arr.length; i += size) {
            chunks.push(arr.slice(i, i + size));
          }
          return chunks;
        };

        const readFileAsArrayBuffer = (file) =>
          new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error || new Error("파일 읽기에 실패했습니다."));
            reader.readAsArrayBuffer(file);
          });

        const openVoucherImportDialog = () => {

          voucherFileInputRef.current?.click();
        };

        const handleVoucherXlsxImport = async (e) => {
          const file = e?.target?.files?.[0];
          e.target.value = "";
          if (!file) return;
          if (!authUser) {
            alert("이메일 로그인 후 사용 가능합니다.");
            return;
          }
          if (!window.XLSX) {
            alert("XLSX 라이브러리 로딩에 실패했습니다.");
            return;
          }

          setIsImportingXlsx(true);
          setImportResultMessage("");
          try {
            const fileBuffer = await readFileAsArrayBuffer(file);
            const workbook = window.XLSX.read(fileBuffer, { type: "array", cellDates: true });
            const sheetName = workbook.SheetNames?.[0];
            if (!sheetName) {
              alert("시트를 찾을 수 없는 파일입니다.");
              return;
            }
            const worksheet = workbook.Sheets[sheetName];

            if (!rows.length) {
              alert("업로드할 데이터가 없습니다.");
              return;
            }

            const feeRegex = /회비|협회|학회|상공회의소|무역협회|membership|상조회비/i;
            const options =
              Array.isArray(settings.entityOptions) && settings.entityOptions.length

            const defaultEntity = options[0] || "본사";
            const existingSourceKeys = new Set(items.map((item) => String(item.sourceVoucherKey || "").trim()).filter(Boolean));
            const inFileKeys = new Set();

            let scannedCount = 0;
            let feeRowCount = 0;
            const importRows = [];

            for (const row of rows) {
              scannedCount += 1;
              const accountName = String(row["계정명"] || "").trim();
              const vendorName = String(row["거래처명"] || "").trim();
              const summaryText = String(row["적요사항"] || "").trim();
              const searchText = `${accountName} ${vendorName} ${summaryText}`;
              if (!feeRegex.test(searchText)) continue;

              const debitAmount = Number(String(row["차변금액"] || "0").replace(/,/g, "")) || 0;
              const creditAmount = Number(String(row["대변금액"] || "0").replace(/,/g, "")) || 0;
              const amount = debitAmount > 0 ? debitAmount : creditAmount > 0 ? creditAmount : 0;
              if (amount <= 0) continue;

              const paymentDate = parseSlipDate(row["전표일자"]);
              if (!paymentDate) continue;

              const voucherNo = String(row["전표번호"] || "").trim();
              const voucherSeq = String(row["전표순번"] || "").trim();
              const orgName = vendorName || String(summaryText.split(/\s+/)[0] || "").trim() || accountName || "미지정 기관";
              const ownerText =
                String(row["귀속부서명"] || "").trim() ||
                String(row["부서명"] || "").trim() ||
                "재경팀";
              const entityText = `${String(row["귀속부서명"] || "").trim()} ${String(row["귀속부서"] || "").trim()} ${String(row["결산단위"] || "").trim()}`;
              const entity = options.find((opt) => entityText.includes(opt)) || defaultEntity;
              const voucherKey = [paymentDate, voucherNo, voucherSeq, orgName, amount].join("|");
              if (existingSourceKeys.has(voucherKey) || inFileKeys.has(voucherKey)) continue;
              inFileKeys.add(voucherKey);
              feeRowCount += 1;

              importRows.push(

                  cycle: "연간",

                  lastPaidDate: paymentDate,
                  paymentMethod: "계좌이체",
                  status: "납부완료",
                  memo: `전표 업로드 · 계정:${accountName || "-"} · 전표:${voucherNo || "-"}-${voucherSeq || "-"} · 적요:${summaryText || "-"}`,
                  sourceVoucherKey: voucherKey,
                  sourceFileName: file.name,
                  sourceSheetName: sheetName,
                  sourceType: "voucher_xlsx",
                  sourceImportedAt: new Date().toISOString(),
                })
              );

            if (!importRows.length) {

            await writeAuditLog("fee_import_xlsx", {

              feeRowCount,
              importedCount: importRows.length,
            });
            setImportResultMessage(`업로드 완료: ${importRows.length}건 (검사 ${scannedCount}건)`);
            alert(`전표 업로드 완료: ${importRows.length}건`);
          } catch (error) {
            console.error("전표 XLSX 업로드 실패", error);
            alert("전표 XLSX 업로드 중 오류가 발생했습니다.");

            setIsImportingXlsx(false);

        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!authUser) {
            alert("이메일 로그인 후 사용 가능합니다.");
            return;
          }
          if (!form.organization.trim() || !form.owner.trim() || !form.amount) {

          if (form.cycle === "월간" && !String(form.monthlyDueMonth || "").trim()) {

          const shouldAutoRegister = !editingId && Boolean(form.autoRenew);
          const autoRenewYear = Number(form.autoRenewYear);
          const autoRenewStartMonth = Number(form.autoRenewStartMonth);
          if (shouldAutoRegister && (!Number.isInteger(autoRenewYear) || autoRenewYear < 2000 || autoRenewYear > 2100)) {
            alert("정기납부 자동등록은 생성 연도를 선택해야 합니다.");

          }

          if (shouldAutoRegister && recurringMonths.length === 0) {

            return;

          const payload = {
            ...form,
            organization: form.organization.trim(),
            owner: form.owner.trim(),
            memo: form.memo.trim(),
            amount: Number(String(form.amount).replace(/,/g, "")) || 0,
            recurringYear: (() => {
              if (form.autoRenewYear) return String(form.autoRenewYear);
              if (form.recurringYear) return String(form.recurringYear);
              const baseDate = String(form.paymentDate || "").trim();
              if (baseDate) {
                const d = new Date(baseDate);
                if (!Number.isNaN(d.getTime())) return String(d.getFullYear());
              }
              if (form.cycle === "월간" && form.monthlyDueMonth) return String(currentYear);

            })(),
            recurringMonth:

                : String(form.recurringMonth || "").trim(),
            paymentDate: form.paymentDate || "",
            nextDueDate: form.paymentDate || "",
            lastPaidDate: form.status === "납부완료" ? form.paymentDate || "" : "",
          };
          const recurringCount = shouldAutoRegister ? recurringMonths.length : 1;
          const submitPayloads = shouldAutoRegister

                ...payload,
                status: "예정",

                recurringYear: String(autoRenewYear),

                paymentDate: "",
                nextDueDate: "",
                lastPaidDate: "",

            : [

                  ...payload,
                  recurringYear: String(payload.recurringYear || ""),
                  recurringMonth: String(payload.recurringMonth || ""),
                  recurringOrder: payload.recurringOrder || "",
                  recurringTotal: payload.recurringTotal || "",
                },

          const duplicateExists = submitPayloads.some((row) =>

                String(item.entity || "").trim() === String(row.entity || "").trim() &&
                String(item.cycle || "").trim() === String(row.cycle || "").trim() &&
                String(item.recurringYear || "").trim() === String(row.recurringYear || "").trim() &&
                String(item.recurringMonth || "").trim() === String(row.recurringMonth || "").trim() &&
                String(item.paymentDate || "").trim() === String(row.paymentDate || "").trim() &&
                String(item.recurringOrder || "").trim() === String(row.recurringOrder || "").trim()
            )

            );

          const sameCategoryItems = items.filter(
            (item) => item.id !== editingId && item.category === payload.category
          );
          const categoryAvg =
            sameCategoryItems.length > 0
              ? sameCategoryItems.reduce((sum, item) => sum + Number(item.amount || 0), 0) /
                sameCategoryItems.length
              : 0;
          if (categoryAvg > 0 && payload.amount > categoryAvg * 2) {
            const proceed = confirm(
              `입력 금액이 해당 구분 평균(${formatKRW(categoryAvg)}) 대비 크게 높습니다. 계속 저장할까요?`
            );

                ...payload,

              });
              await writeAuditLog("fee_updated", {
                id: editingId,
                organization: payload.organization,
                entity: payload.entity,
                cycle: payload.cycle,
                amount: payload.amount,
              });

              if (shouldAutoRegister) {
                await Promise.all(
                  submitPayloads.map((row) =>
                    addDoc(collection(db, COLLECTION_NAME), {
                      ...row,
                      createdAt: serverTimestamp(),
                      updatedAt: serverTimestamp(),

                  )
                );
                await writeAuditLog("fee_created_bulk", {
                  organization: payload.organization,

                  cycle: payload.cycle,
                  amount: payload.amount,
                  count: submitPayloads.length,

                  ...payload,
                  createdAt: serverTimestamp(),
                  updatedAt: serverTimestamp(),
                });
                await writeAuditLog("fee_created", {
                  id: created.id,
                  organization: payload.organization,
                  entity: payload.entity,
                  cycle: payload.cycle,
                  amount: payload.amount,
                });

            resetForm();

            console.error("저장 실패", error);
            alert("저장 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
          }
        };

        const handleEdit = (item) => {
          const paymentDate = String(item?.paymentDate || "").trim();
          const paymentDateObj = paymentDate ? new Date(paymentDate) : null;
          const paymentMonth =
            paymentDateObj && !Number.isNaN(paymentDateObj.getTime()) ? String(paymentDateObj.getMonth() + 1) : "";
          setEditingId(item.id);
          setForm({
            ...emptyForm,
            ...item,
            amount: String(item.amount),

                          />
                        </Field>
                        <Field label="연체 유예 일수">
                          <input
                            className="input-style"
                            type="number"
                            min="0"
                            value={settings.overdueGraceDays}
                            onChange={(e) => handleSettingsChange("overdueGraceDays", e.target.value)}
                          />
                        </Field>
                        <Field label="결재 필요 기준금액">
                          <input
                            className="input-style"
                            type="number"
                            min="0"
                            value={settings.approvalRequiredAmount}
                            onChange={(e) => handleSettingsChange("approvalRequiredAmount", e.target.value)}
                          />
                        </Field>
                      </div>
                      <div className="mt-3 space-y-2">
                        <label className="flex items-center gap-2 text-sm text-slate-700">
                          <input
                            type="checkbox"
                            checked={settings.allowCsvExport}
                            onChange={(e) => handleSettingsChange("allowCsvExport", e.target.checked)}
                          />
                          XLSX 내보내기 허용
                        </label>
                      </div>
                      <div className="flex gap-2 mt-4">
                        <button
                          onClick={saveSettings}
                          disabled={settingsSaving}
                          className="px-4 py-2.5 rounded-xl bg-brand-600 text-white text-sm font-semibold hover:bg-brand-700 disabled:opacity-60"
                        >
                          {settingsSaving ? "저장 중..." : "설정 저장"}
                        </button>
                        <button
                          onClick={() => {
                            setSettings(defaultSettings);
                            setEntityOptionsInput((defaultSettings.entityOptions || []).join("\n"));
                            setPreIssuedAccountEmailsInput((defaultSettings.preIssuedAccountEmails || []).join("\n"));
                          }}
                          className="px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm font-semibold hover:bg-slate-100"
                        >
                          기본값으로 초기화
                        </button>
                      </div>
                    </Card>
                    <div className="space-y-4">
                      <Card title="운영 체크리스트" subtitle="회비 담당자 권장 프로세스">
                        <ul className="text-sm space-y-2 text-slate-700">
                          <li>1) 월초: 만기 {settings.alertDaysBefore}일 이내 항목 선공지</li>
                          <li>2) 납부 후: 상태/납부일/증빙 메모 즉시 업데이트</li>
                          <li>3) 분기말: 연체 사유와 실익을 검토해 유지 여부 재평가</li>
                          <li>4) 연말: 다음연도 예산 기준({formatKRW(settings.approvalRequiredAmount || 0)}) 재설정</li>
                        </ul>
                      </Card>
                      <Card title="신규 가입 승인 관리" subtitle="Admin 전용 사용자 승인">
                        <div className="space-y-2 max-h-[280px] overflow-auto pr-1">
                          {userAccounts.filter((u) => !u.approved).length === 0 && (
                            <p className="text-sm text-slate-500">승인 대기 계정이 없습니다.</p>
                          )}
                          {userAccounts
                            .filter((u) => !u.approved && !isAdminEmail(u.email))
                            .map((u) => (
                              <div
                                key={u.id}
                                className="p-3 rounded-xl border border-slate-200 bg-white flex items-center justify-between gap-3"
                              >
                                <div>
                                  <p className="text-sm font-semibold text-slate-900">{u.email || "(이메일 없음)"}</p>
                                  <p className="text-xs text-slate-500 mt-1">UID: {u.uid || u.id}</p>
                                </div>
                                <div className="flex gap-1.5">
                                  <button
                                    onClick={() => handleUserApproval(u.id, true)}
                                    className="px-2 py-1 text-xs rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
                                  >
                                    승인
                                  </button>
                                  <button
                                    onClick={() => handleUserApproval(u.id, false)}
                                    className="px-2 py-1 text-xs rounded-lg border border-rose-200 bg-rose-50 text-rose-700 hover:bg-rose-100"
                                  >
                                    반려
                                  </button>
                                </div>
                              </div>
                            ))}
                        </div>
                      </Card>
                      <Card title="승인된 계정 목록" subtitle="비밀번호 초기화(재설정 메일 발송)">
                        <div className="space-y-2 max-h-[280px] overflow-auto pr-1">
                          {userAccounts.filter((u) => u.approved === true).length === 0 && (
                            <p className="text-sm text-slate-500">승인된 계정이 없습니다.</p>
                          )}
                          {userAccounts
                            .filter((u) => u.approved === true)
                            .map((u) => (
                              <div
                                key={u.id}
                                className="p-3 rounded-xl border border-slate-200 bg-white flex items-center justify-between gap-3"
                              >
                                <div>
                                  <p className="text-sm font-semibold text-slate-900">{u.email || "(이메일 없음)"}</p>
                                  <p className="text-xs text-slate-500 mt-1">
                                    UID: {u.uid || u.id}
                                    {u.approvedAt?.toDate ? ` · 승인일: ${u.approvedAt.toDate().toLocaleDateString("ko-KR")}` : ""}
                                  </p>
                                </div>
                                <button
                                  onClick={() => handleApprovedUserPasswordReset(u)}
                                  disabled={resettingPasswordUserId === u.id || !u.email}
                                  className="px-2 py-1 text-xs rounded-lg border border-indigo-200 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 disabled:opacity-50"
                                >
                                  {resettingPasswordUserId === u.id ? "발송 중..." : "비밀번호 초기화"}
                                </button>
                              </div>
                            ))}
                        </div>
                      </Card>
                      <Card title="설정 반영 범위" subtitle="회비 담당자 운영 기준">
                        <ul className="text-sm space-y-2 text-slate-700">
                          <li>1) 알림 일수: 대시보드 도래 건수와 리스크 항목 기준으로 사용</li>
                          <li>2) 유예 일수: 납부일 초과 항목의 경고 수준 판단에 반영</li>
                          <li>3) 결재 기준금액: 고액 회비 목록과 결재 검토 대상 생성</li>
                          <li>4) 법인/사업장 목록: 회비 등록 메뉴의 드롭다운 옵션으로 즉시 반영</li>
                          <li>5) 기능 제어: XLSX 내보내기 버튼 권한을 통합 제어</li>
                          <li>6) 저장 범위: 모든 로그인 사용자가 동일한 설정을 공유</li>
                          <li>7) 권한 정책: Admin 계정만 환경설정과 가입 승인을 처리</li>
                        </ul>
                      </Card>
                    </div>
                  </section>
                )}
              </div>
            </div>
            {isEntityDetailModalOpen && (
              <div
                className="fixed inset-0 z-50 bg-slate-900/45 backdrop-blur-[1px] flex items-center justify-center p-3"
                onClick={closeEntityDetailModal}
              >
                <div
                  ref={entityModalRef}
                  role="dialog"
                  aria-modal="true"
                  aria-label="사업장별 집행 상세"
                  tabIndex={-1}
                  className="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white p-4 md:p-5 shadow-2xl"
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <p className="text-xs font-semibold text-brand-700">{dashboardYearNumber} 사업장별 집행 상세</p>
                      <h3 className="text-lg font-bold text-slate-900 mt-1">{activeDashboardEntity || "-"}</h3>
                    </div>
                    <button
                      type="button"
                      onClick={closeEntityDetailModal}
                      className="w-8 h-8 rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50"
                    >
                      <i className="fa-solid fa-xmark"></i>
                    </button>
                  </div>
                  <div className="mt-3 space-y-2 max-h-[460px] overflow-auto">
                    {selectedEntityItems.length === 0 && (
                      <p className="text-sm text-slate-500">선택한 사업장에 해당하는 데이터가 없습니다.</p>
                    )}
                    {selectedEntityItems.map((item) => (
                      <div key={item.id} className="p-3 rounded-xl border border-slate-200 bg-white">
                        <div className="flex items-center justify-between gap-2">
                          <p className="text-sm font-semibold text-slate-900">{item.organization}</p>
                          <StatusBadge status={item.status} />
                        </div>
                        <p className="text-xs text-slate-600 mt-1">
                          {item.owner || "-"} · {item.cycle || "-"} · {getPaymentDate(item) || "납부일 미정"}
                        </p>
                        <p className="text-xs font-semibold text-slate-800 mt-1">{formatKRW(item.amount)}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
            {isRoadmapDetailModalOpen && (
              <div
                className="fixed inset-0 z-50 bg-slate-900/45 backdrop-blur-[1px] flex items-center justify-center p-3"
                onClick={closeRoadmapDetailModal}
              >
                <div
                  ref={roadmapModalRef}
                  role="dialog"
                  aria-modal="true"
                  aria-label="납부 로드맵 상세"
                  tabIndex={-1}
                  className="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white p-4 md:p-5 shadow-2xl"
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <p className="text-xs font-semibold text-brand-700">{dashboardYearNumber} 납부 로드맵 상세</p>
                      <h3 className="text-lg font-bold text-slate-900 mt-1">{activeRoadmapMonth}월</h3>
                    </div>
                    <button
                      type="button"
                      onClick={closeRoadmapDetailModal}
                      className="w-8 h-8 rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50"
                    >
                      <i className="fa-solid fa-xmark"></i>
                    </button>
                  </div>
                  <div className="mt-3 text-xs text-slate-600">
                    총 {selectedRoadmapSummary?.count || 0}건 · {formatKRW(selectedRoadmapSummary?.amount || 0)}
                  </div>
                  <div className="mt-2 space-y-2 max-h-[430px] overflow-auto">
                    {selectedRoadmapItems.length === 0 && (
                      <p className="text-sm text-slate-500">선택한 월의 로드맵 데이터가 없습니다.</p>
                    )}
                    {selectedRoadmapItems.map((item) => (
                      <div key={item.id} className="p-3 rounded-xl border border-slate-200 bg-white">
                        <div className="flex items-center justify-between gap-2">
                          <p className="text-sm font-semibold text-slate-900">{item.organization}</p>
                          <StatusBadge status={item.status} />
                        </div>
                        <p className="text-xs text-slate-600 mt-1">
                          {item.entity || "-"} · {item.owner || "-"} · {getPaymentDate(item) || "납부일 미정"}
                        </p>
                        <p className="text-xs font-semibold text-slate-800 mt-1">{formatKRW(item.amount)}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
            {isTopDetailModalOpen && selectedTopDetail && (
              <div
                className="fixed inset-0 z-50 bg-slate-900/45 backdrop-blur-[1px] flex items-center justify-center p-3"
                onClick={closeTopDetailModal}
              >
                <div
                  ref={topModalRef}
                  role="dialog"
                  aria-modal="true"
                  aria-label="연간 납부 Top 상세"
                  tabIndex={-1}
                  className="w-full max-w-xl rounded-2xl border border-slate-200 bg-white p-4 md:p-5 shadow-2xl"
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <p className="text-xs font-semibold text-brand-700">{dashboardYearNumber} 연간 납부 Top 상세</p>
                      <h3 className="text-lg font-bold text-slate-900 mt-1">
                        {selectedTopDetail.organization}
                      </h3>
                    </div>
                    <button
                      type="button"
                      onClick={closeTopDetailModal}
                      className="w-8 h-8 rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50"
                    >
                      <i className="fa-solid fa-xmark"></i>
                    </button>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-3 text-xs">
                    <div className="rounded-lg bg-slate-50 border border-slate-200 p-2.5">
                      <p className="text-slate-500">실납부 총액</p>
                      <p className="font-semibold text-slate-900 mt-0.5">
                        {formatKRW(selectedTopDetail.paidAmount)}
                      </p>
                    </div>
                    <div className="rounded-lg bg-slate-50 border border-slate-200 p-2.5">
                      <p className="text-slate-500">납부 건수</p>
                      <p className="font-semibold text-slate-900 mt-0.5">
                        {selectedTopDetail.paidCount}건
                      </p>
                    </div>
                  </div>
                  <div className="mt-3 text-xs text-slate-700 space-y-1.5">
                    <p className="font-semibold text-slate-800">법인/사업장별</p>
                    {selectedTopDetail.entitySummary.map(([name, amount]) => (
                      <div key={`entity-${name}`} className="flex items-center justify-between">
                        <span>{name}</span>
                        <span className="font-semibold">{formatKRW(amount)}</span>
                      </div>
                    ))}
                  </div>
                  <div className="mt-3 text-xs text-slate-700 space-y-1.5">
                    <p className="font-semibold text-slate-800">주기별</p>
                    {selectedTopDetail.cycleSummary.map(([name, amount]) => (
                      <div key={`cycle-${name}`} className="flex items-center justify-between">
                        <span>{name}</span>
                        <span className="font-semibold">{formatKRW(amount)}</span>
                      </div>
                    ))}
                  </div>
                  <div className="mt-3 text-xs text-slate-700 space-y-1.5">
                    <p className="font-semibold text-slate-800">상태 건수</p>
                    {selectedTopDetail.statusSummary.map(([name, count]) => (
                      <div key={`status-${name}`} className="flex items-center justify-between">
                        <span>{name}</span>
                        <span className="font-semibold">{count}건</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>
        );
      }

      function Card({ title, subtitle, children }) {
        return (
          <section className="glass-card rounded-3xl shadow-soft p-4 md:p-5 animate-reveal-up">
            <div className="mb-3 md:mb-4">
              <h2 className="text-lg md:text-xl font-bold text-slate-900">{title}</h2>
              {subtitle && <p className="text-xs md:text-sm text-slate-500 mt-1">{subtitle}</p>}
            </div>
            {children}
          </section>
        );
      }

      function Field({ label, children }) {
        return (
          <label className="block">
            <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>
            {children}
          </label>
        );
      }

      function KpiCard({ label, value, icon, tone, pulse = false }) {
        const tones = {
          brand: "from-cyan-600 to-sky-700",
          emerald: "from-emerald-500 to-teal-700",
          rose: "from-rose-500 to-red-700",
          amber: "from-amber-500 to-orange-700",
        };
        return (
          <div
            className={`rounded-2xl p-4 md:p-5 text-white bg-gradient-to-br ${tones[tone]} shadow-soft ${pulse ? "animate-pulse-soft" : ""}`}
          >
            <div className="flex items-start justify-between gap-3">
              <div>
                <p className="text-xs text-white/80 tracking-wide uppercase">{label}</p>
                <p className="text-2xl font-black mt-2 leading-tight">{value}</p>
              </div>
              <span className="w-10 h-10 rounded-xl bg-white/20 grid place-items-center">
                <i className={`fa-solid fa-${icon}`}></i>
              </span>
            </div>
          </div>
        );
      }

      function StatusBadge({ status }) {
        const map = {
          예정: "bg-sky-100 text-sky-700",
          납부완료: "bg-emerald-100 text-emerald-700",
          연체: "bg-rose-100 text-rose-700",
          검토중: "bg-amber-100 text-amber-700",
        };
        return (
          <span className={`inline-flex px-2.5 py-1 rounded-full text-xs font-bold ${map[status] || "bg-slate-100 text-slate-700"}`}>
            {status}
          </span>
        );
      }

      try {
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      } catch (error) {
        console.error("초기 렌더링 실패", error);
        const root = document.getElementById("root");
        if (root) {
          root.innerHTML = `
            <div style="max-width:760px;margin:48px auto;padding:24px;border:1px solid #fecaca;background:#fff1f2;border-radius:16px;font-family:Pretendard,sans-serif;color:#881337;">
              <h1 style="font-size:20px;font-weight:700;margin-bottom:8px;">화면 로딩에 실패했습니다.</h1>
              <p style="font-size:14px;line-height:1.6;">브라우저 콘솔(F12) 오류를 확인해 주세요. 네트워크 차단, 외부 CDN 차단, 브라우저 보안정책(file://) 이슈일 수 있습니다.</p>
            </div>
          `;
        }
      }
    </script>
  </body>
</html>

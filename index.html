      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

        createUserWithEmailAndPassword,

        getFirestore,
        collection,
        addDoc,
        updateDoc,
        deleteDoc,
        setDoc,

      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCRoSo6X7uIXF8Ak_CNWQa3RTovbcukapg",
        authDomain: "m-crm-1d38a.firebaseapp.com",
        projectId: "m-crm-1d38a",
        storageBucket: "m-crm-1d38a.firebasestorage.app",
        messagingSenderId: "622602030287",
        appId: "1:622602030287:web:a2001e2b9acda77426bbba",
        measurementId: "G-7VMBC13GBM",
      };

      try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let analytics = null;
        isSupported()
          .then((supported) => {
            if (supported) analytics = getAnalytics(app);

        window.FeeFirebase = {
          app,
          auth,

          analytics,
          methods: {
            onAuthStateChanged,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,

            query,

            limit,
            serverTimestamp,
          },
        };
      } catch (error) {
        console.error("Firebase 초기화 실패", error);
        window.FeeFirebase = null;
      }
    </script>

    <script type="text/babel">
      const { useMemo, useState, useEffect } = React;

      const CACHE_KEY = "corp_membership_fees_cache_v1";
      const COLLECTION_NAME = "corp_membership_fees";
      const CONFIG_COLLECTION_NAME = "corp_membership_config";
      const CONFIG_DOC_ID = "global";
      const USERS_COLLECTION_NAME = "corp_membership_users";
      const ADMIN_EMAIL = "jiwon2@yujintechnology.com";
      const SAVED_EMAIL_KEY = "corp_membership_saved_email_v1";
      const defaultSettings = {
        companyName: "우리회사",
        fiscalStartMonth: "1",
        alertDaysBefore: "30",
        overdueGraceDays: "3",
        approvalRequiredAmount: "3000000",
        managerEmail: "",
        entityOptions: ["본사", "서울지사", "부산지사", "해외법인"],
        allowCsvExport: true,
      };
      const monthLabels = Array.from({ length: 12 }, (_, i) => `${i + 1}월`);

      const formatKRW = (value) =>
        new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(
          Number(value || 0)
        );

      const formatDate = (value) => {
        if (!value) return "-";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "-";
        return d.toLocaleDateString("ko-KR");
      };
      const getPaymentDate = (item) =>
        String(item?.paymentDate || item?.nextDueDate || item?.lastPaidDate || "");

      const getDaysUntil = (dateStr) => {
        if (!dateStr) return null;
        const today = new Date();
        const target = new Date(dateStr);
        today.setHours(0, 0, 0, 0);
        target.setHours(0, 0, 0, 0);
        return Math.ceil((target - today) / 86400000);
      };

      const defaultItems = [
        {
          id: crypto.randomUUID(),
          organization: "대한상공회의소",
          category: "협회",
          entity: "본사",
          owner: "총무팀",
          cycle: "연간",
          amount: 2400000,
          paymentDate: "2026-03-20",
          nextDueDate: "2026-03-20",
          lastPaidDate: "",
          paymentMethod: "법인카드",
          budgetCode: "ADM-01",
          status: "예정",
          autoRenew: true,
          memo: "정기 회원사 자격 유지",
        },
        {
          id: crypto.randomUUID(),
          organization: "한국무역협회",
          category: "유관기관",
          entity: "서울지사",
          owner: "해외사업팀",
          cycle: "연간",
          amount: 1800000,
          paymentDate: "2026-02-15",
          nextDueDate: "2026-02-15",
          lastPaidDate: "",
          paymentMethod: "세금계산서",
          budgetCode: "BIZ-13",
          status: "연체",
          autoRenew: false,
          memo: "미납 시 교육할인 중단 위험",
        },
        {
          id: crypto.randomUUID(),
          organization: "한국인사관리학회",
          category: "학회",
          entity: "본사",
          owner: "HR팀",
          cycle: "반기",
          amount: 750000,
          paymentDate: "2026-06-10",
          nextDueDate: "2026-06-10",
          lastPaidDate: "",
          paymentMethod: "계좌이체",
          budgetCode: "HR-07",
          status: "납부완료",
          autoRenew: true,
          memo: "학술자료 구독 포함",
        },
      ];

      const readCache = () => {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return defaultItems;
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : defaultItems;
        } catch {
          return defaultItems;
        }
      };

      const saveCache = (items) => {
        localStorage.setItem(CACHE_KEY, JSON.stringify(items));
      };

      const emptyForm = {
        organization: "",
        category: "협회",
        entity: "본사",
        owner: "",
        cycle: "연간",
        amount: "",
        paymentDate: "",
        paymentMethod: "계좌이체",
        budgetCode: "",
        status: "예정",
        autoRenew: true,
        memo: "",
      };

      function App() {
        const [items, setItems] = useState(readCache);
        const [form, setForm] = useState(emptyForm);
        const [editingId, setEditingId] = useState(null);
        const [isSyncing, setIsSyncing] = useState(true);
        const [isCloudConnected, setIsCloudConnected] = useState(false);
        const [authUser, setAuthUser] = useState(null);
        const [authReady, setAuthReady] = useState(false);
        const [loginEmail, setLoginEmail] = useState(() => {
          try {
            return localStorage.getItem(SAVED_EMAIL_KEY) || "";
          } catch {
            return "";
          }
        });
        const [loginPassword, setLoginPassword] = useState("");
        const [loginPasswordConfirm, setLoginPasswordConfirm] = useState("");
        const [loginError, setLoginError] = useState("");
        const [loginLoading, setLoginLoading] = useState(false);
        const [isRegisterMode, setIsRegisterMode] = useState(false);
        const [rememberEmail, setRememberEmail] = useState(() => {
          try {
            return Boolean(localStorage.getItem(SAVED_EMAIL_KEY));
          } catch {
            return false;
          }
        });
        const [activeMenu, setActiveMenu] = useState("dashboard");
        const [settings, setSettings] = useState(defaultSettings);
        const [settingsSaving, setSettingsSaving] = useState(false);
        const [entityOptionsInput, setEntityOptionsInput] = useState(
          (defaultSettings.entityOptions || []).join("\n")
        );
        const [userProfile, setUserProfile] = useState(null);
        const [userProfileReady, setUserProfileReady] = useState(false);
        const [userAccounts, setUserAccounts] = useState([]);
        const [auditLogs, setAuditLogs] = useState([]);

        const [search, setSearch] = useState("");
        const [statusFilter, setStatusFilter] = useState("전체");
        const [entityFilter, setEntityFilter] = useState("전체");
        const [currentPage, setCurrentPage] = useState(1);
        const pageSize = 10;

        useEffect(() => {
          saveCache(items);
        }, [items]);

        useEffect(() => {
          const options =
            Array.isArray(settings.entityOptions) && settings.entityOptions.length
              ? settings.entityOptions
              : defaultSettings.entityOptions;
          if (!options.includes(form.entity)) {
            setForm((prev) => ({ ...prev, entity: options[0] }));
          }
          if (entityFilter !== "전체" && !options.includes(entityFilter)) {
            setEntityFilter("전체");
          }
        }, [settings.entityOptions, form.entity, entityFilter]);

        useEffect(() => {
          const admin =
            String(authUser?.email || "").toLowerCase() === ADMIN_EMAIL || userProfile?.role === "admin";
          if (!admin && (activeMenu === "settings" || activeMenu === "audit")) {
            setActiveMenu("dashboard");
          }
        }, [activeMenu, authUser?.email, userProfile?.role]);

        useEffect(() => {
          const fb = window.FeeFirebase;
          if (!fb?.db || !fb?.auth || !fb?.methods) {
            setIsSyncing(false);
            setIsCloudConnected(false);
            setAuthReady(true);
            setUserProfileReady(true);
            return;
          }

          const { auth, db, methods } = fb;
          const { onAuthStateChanged, collection, onSnapshot, query, orderBy, limit, getDoc } = methods;

          let stopSnapshot = null;
          let stopConfigSnapshot = null;
          let stopUserProfileSnapshot = null;
          let stopUserAccountsSnapshot = null;
          let stopAuditSnapshot = null;
          const stopAuth = onAuthStateChanged(
            auth,
            async (user) => {
              setAuthUser(user || null);
              setAuthReady(true);
              setUserProfileReady(false);

              if (typeof stopSnapshot === "function") {
                stopSnapshot();
                stopSnapshot = null;
              }
              if (typeof stopConfigSnapshot === "function") {
                stopConfigSnapshot();
                stopConfigSnapshot = null;
              }
              if (typeof stopUserProfileSnapshot === "function") {
                stopUserProfileSnapshot();
                stopUserProfileSnapshot = null;
              }
              if (typeof stopUserAccountsSnapshot === "function") {
                stopUserAccountsSnapshot();
                stopUserAccountsSnapshot = null;
              }
              if (typeof stopAuditSnapshot === "function") {
                stopAuditSnapshot();
                stopAuditSnapshot = null;
              }

              if (!user) {
                setItems(readCache());
                setIsCloudConnected(false);
                setIsSyncing(false);
                setUserProfile(null);
                setUserAccounts([]);
                setAuditLogs([]);
                setUserProfileReady(true);
                return;
              }

              const userEmail = String(user.email || "").toLowerCase();
              const isAdminEmail = userEmail === ADMIN_EMAIL;
              const userDocRef = methods.doc(db, USERS_COLLECTION_NAME, user.uid);
              try {
                const userSnap = await getDoc(userDocRef);
                if (!userSnap.exists()) {
                  await methods.setDoc(
                    userDocRef,
                    {
                      uid: user.uid,
                      email: user.email || "",
                      role: isAdminEmail ? "admin" : "user",
                      approved: isAdminEmail,
                      requestedAt: methods.serverTimestamp(),
                      lastLoginAt: methods.serverTimestamp(),
                    },
                    { merge: true }
                  );
                } else {
                  const data = userSnap.data() || {};
                  await methods.setDoc(
                    userDocRef,
                    {
                      email: user.email || data.email || "",
                      lastLoginAt: methods.serverTimestamp(),
                      role: isAdminEmail ? "admin" : data.role || "user",
                      approved: isAdminEmail ? true : data.approved === true,
                    },
                    { merge: true }
                  );
                }
              } catch (error) {
                console.error("사용자 프로필 초기화 실패", error);
              }

              stopUserProfileSnapshot = onSnapshot(
                userDocRef,
                (snap) => {
                  setUserProfile(snap.exists() ? { id: snap.id, ...snap.data() } : null);
                  setUserProfileReady(true);
                },
                () => {
                  setUserProfile(null);
                  setUserProfileReady(true);
                }
              );

              if (isAdminEmail) {
                const qUsers = query(collection(db, USERS_COLLECTION_NAME), orderBy("requestedAt", "desc"));
                stopUserAccountsSnapshot = onSnapshot(
                  qUsers,
                  (snap) => {
                    setUserAccounts(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
                  },
                  () => {
                    setUserAccounts([]);
                  }
                );
                const qAudit = query(collection(db, "logs"), orderBy("createdAt", "desc"), limit(200));
                stopAuditSnapshot = onSnapshot(
                  qAudit,
                  (snap) => {
                    const rows = snap.docs
                      .map((d) => ({ id: d.id, ...d.data() }))
                      .filter((row) => row.app === "membership_fee");
                    setAuditLogs(rows);
                  },
                  () => {
                    setAuditLogs([]);
                  }
                );
              } else {
                setUserAccounts([]);
                setAuditLogs([]);
              }

              setIsSyncing(true);
              const q = query(collection(db, COLLECTION_NAME), orderBy("createdAt", "desc"));
              stopSnapshot = onSnapshot(
                q,
                (snapshot) => {
                  const docs = snapshot.docs.map((d) => ({ ...d.data(), id: d.id }));
                  setItems(docs);
                  setIsCloudConnected(true);
                  setIsSyncing(false);
                },
                () => {
                  setIsCloudConnected(false);
                  setIsSyncing(false);
                }
              );

              const configDocRef = methods.doc(db, CONFIG_COLLECTION_NAME, CONFIG_DOC_ID);
              stopConfigSnapshot = onSnapshot(
                configDocRef,
                (snap) => {
                  if (!snap.exists()) {
                    setSettings(defaultSettings);
                    return;
                  }
                  const data = snap.data() || {};
                  const mergedEntityOptions = Array.isArray(data.entityOptions)
                    ? data.entityOptions.filter((v) => String(v || "").trim())
                    : defaultSettings.entityOptions;
                  setSettings({
                    ...defaultSettings,
                    ...data,
                    entityOptions: mergedEntityOptions.length ? mergedEntityOptions : defaultSettings.entityOptions,
                    allowCsvExport: data.allowCsvExport !== false,
                  });
                  setEntityOptionsInput(
                    (mergedEntityOptions.length ? mergedEntityOptions : defaultSettings.entityOptions).join("\n")
                  );
                },
                () => {
                  setSettings(defaultSettings);
                  setEntityOptionsInput((defaultSettings.entityOptions || []).join("\n"));
                }
              );
            },
            () => {
              setAuthUser(null);
              setAuthReady(true);
              setIsCloudConnected(false);
              setIsSyncing(false);
              setUserProfile(null);
              setUserAccounts([]);
              setAuditLogs([]);
              setUserProfileReady(true);
            }
          );

          return () => {
            if (typeof stopSnapshot === "function") stopSnapshot();
            if (typeof stopConfigSnapshot === "function") stopConfigSnapshot();
            if (typeof stopUserProfileSnapshot === "function") stopUserProfileSnapshot();
            if (typeof stopUserAccountsSnapshot === "function") stopUserAccountsSnapshot();
            if (typeof stopAuditSnapshot === "function") stopAuditSnapshot();
            if (typeof stopAuth === "function") stopAuth();
          };
        }, []);

        const handleLogin = async (e) => {
          e.preventDefault();
          setLoginError("");
          const fb = window.FeeFirebase;
          if (!fb?.auth || !fb?.methods) {
            setLoginError("Firebase 인증 초기화에 실패했습니다.");
            return;
          }
          if (!loginEmail.trim() || !loginPassword) {
            setLoginError("이메일과 비밀번호를 입력하세요.");
            return;
          }
          if (isRegisterMode && loginPassword !== loginPasswordConfirm) {
            setLoginError("비밀번호 확인이 일치하지 않습니다.");
            return;
          }

          try {
            setLoginLoading(true);
            await fb.methods.setPersistence(fb.auth, fb.methods.browserLocalPersistence);
            if (isRegisterMode) {
              await fb.methods.createUserWithEmailAndPassword(fb.auth, loginEmail.trim(), loginPassword);
            } else {
              await fb.methods.signInWithEmailAndPassword(fb.auth, loginEmail.trim(), loginPassword);
            }
            if (rememberEmail) {
              localStorage.setItem(SAVED_EMAIL_KEY, loginEmail.trim());
            } else {
              localStorage.removeItem(SAVED_EMAIL_KEY);
            }
            setLoginPassword("");
            setLoginPasswordConfirm("");
          } catch (error) {
            const code = error?.code || "";
            if (code.includes("invalid-credential") || code.includes("wrong-password")) {
              setLoginError("이메일 또는 비밀번호가 올바르지 않습니다.");
            } else if (code.includes("user-not-found")) {
              setLoginError("등록되지 않은 계정입니다.");
            } else if (code.includes("email-already-in-use")) {
              setLoginError("이미 사용 중인 이메일입니다.");
            } else if (code.includes("weak-password")) {
              setLoginError("비밀번호는 6자 이상이어야 합니다.");
            } else {
              setLoginError(isRegisterMode ? "계정 생성에 실패했습니다." : "로그인에 실패했습니다.");
            }
          } finally {
            setLoginLoading(false);
          }
        };

        const handleLogout = async () => {
          const fb = window.FeeFirebase;
          if (!fb?.auth || !fb?.methods) return;
          try {
            await fb.methods.signOut(fb.auth);
          } catch (error) {
            console.error("로그아웃 실패", error);
          }
        };

        const handleSettingsChange = (key, value) => {
          setSettings((prev) => ({ ...prev, [key]: value }));
        };

        const saveSettings = async () => {
          if (!authUser) {
            alert("이메일 로그인 후 사용 가능합니다.");
            return;
          }
          const isAdmin =
            String(authUser?.email || "").toLowerCase() === ADMIN_EMAIL ||
            userProfile?.role === "admin";
          if (!isAdmin) {
            alert("환경설정은 Admin 계정만 접근 가능합니다.");
            return;
          }
          const fb = window.FeeFirebase;
          if (!fb?.db || !fb?.methods) return;

          try {
            setSettingsSaving(true);
            const parsedEntityOptions = Array.from(
              new Set(
                String(entityOptionsInput || "")
                  .split(/\n|,/)
                  .map((v) => v.trim())
                  .filter(Boolean)
              )
            );
            const payload = {
              ...settings,
              entityOptions: parsedEntityOptions.length
                ? parsedEntityOptions
                : defaultSettings.entityOptions,
              updatedBy: authUser.email || authUser.uid,
              updatedAt: fb.methods.serverTimestamp(),
            };
            await fb.methods.setDoc(fb.methods.doc(fb.db, CONFIG_COLLECTION_NAME, CONFIG_DOC_ID), payload, {
              merge: true,
            });
            setSettings((prev) => ({ ...prev, entityOptions: payload.entityOptions }));
            alert("환경설정을 저장했습니다.");
          } catch (error) {
            console.error("환경설정 저장 실패", error);
            const code = String(error?.code || "");
            const message = String(error?.message || "");
            if (code.includes("permission-denied")) {
              alert(
                "환경설정 저장 권한이 없습니다. Firestore Rules에서 `corp_membership_config/global` 문서 쓰기 권한을 Admin 계정에 허용해야 합니다."
              );
            } else {
              alert(`환경설정 저장에 실패했습니다. (${code || "unknown"}) ${message}`);
            }
          } finally {
            setSettingsSaving(false);
          }
        };

        const handleUserApproval = async (userId, shouldApprove) => {
          const isAdmin =
            String(authUser?.email || "").toLowerCase() === ADMIN_EMAIL ||
            userProfile?.role === "admin";
          if (!isAdmin) {
            alert("Admin 계정만 승인할 수 있습니다.");
            return;
          }
          const fb = window.FeeFirebase;
          if (!fb?.db || !fb?.methods) return;
          try {
            await fb.methods.updateDoc(fb.methods.doc(fb.db, USERS_COLLECTION_NAME, userId), {
              approved: shouldApprove,
              role: shouldApprove ? "user" : "user",
              approvedAt: shouldApprove ? fb.methods.serverTimestamp() : null,
              approvedBy: shouldApprove ? authUser?.email || authUser?.uid : null,
              rejectedAt: !shouldApprove ? fb.methods.serverTimestamp() : null,
              rejectedBy: !shouldApprove ? authUser?.email || authUser?.uid : null,
            });
            await writeAuditLog(shouldApprove ? "user_approved" : "user_rejected", {
              userId,
            });
          } catch (error) {
            console.error("사용자 승인 처리 실패", error);
            alert("사용자 승인 처리 중 오류가 발생했습니다.");
          }
        };

        const writeAuditLog = async (action, payload = {}) => {
          const fb = window.FeeFirebase;
          if (!authUser || !fb?.db || !fb?.methods) return;
          try {
            await fb.methods.addDoc(fb.methods.collection(fb.db, "logs"), {
              app: "membership_fee",
              module: "fees",
              action,
              actorUid: authUser.uid,
              actorEmail: authUser.email || "",
              payload,
              createdAt: fb.methods.serverTimestamp(),
            });
          } catch (error) {
            console.error("감사로그 저장 실패", error);
          }
        };

        const stats = useMemo(() => {
          const alertDays = Number(settings.alertDaysBefore) || 30;
          const annualPlan = items.reduce((sum, item) => {
            const multiplier = item.cycle === "월간" ? 12 : item.cycle === "분기" ? 4 : item.cycle === "반기" ? 2 : 1;
            return sum + Number(item.amount || 0) * multiplier;
          }, 0);

          const paid = items
            .filter((item) => item.status === "납부완료")
            .reduce((sum, item) => sum + Number(item.amount || 0), 0);

          const overdue = items
            .filter((item) => item.status === "연체")
            .reduce((sum, item) => sum + Number(item.amount || 0), 0);

          const next30 = items.filter((item) => {
            const days = getDaysUntil(getPaymentDate(item));
            return days !== null && days >= 0 && days <= alertDays;
          }).length;

          return { annualPlan, paid, overdue, next30 };
        }, [items, settings.alertDaysBefore]);

        const filteredItems = useMemo(() => {
          return items.filter((item) => {
            const text = `${item.organization} ${item.owner} ${item.category} ${item.budgetCode}`.toLowerCase();
            const q = search.trim().toLowerCase();
            if (q && !text.includes(q)) return false;
            if (statusFilter !== "전체" && item.status !== statusFilter) return false;
            if (entityFilter !== "전체" && item.entity !== entityFilter) return false;
            return true;
          });
        }, [items, search, statusFilter, entityFilter]);
        const totalPages = Math.max(1, Math.ceil(filteredItems.length / pageSize));
        const pagedItems = useMemo(() => {
          const start = (currentPage - 1) * pageSize;
          return filteredItems.slice(start, start + pageSize);
        }, [filteredItems, currentPage]);

        const categorySummary = useMemo(() => {
          const map = new Map();
          for (const item of items) {
            map.set(item.category, (map.get(item.category) || 0) + Number(item.amount || 0));
          }
          return [...map.entries()].sort((a, b) => b[1] - a[1]);
        }, [items]);

        const riskItems = useMemo(() => {
          const alertDays = Number(settings.alertDaysBefore) || 30;
          const graceDays = Number(settings.overdueGraceDays) || 0;
          return [...items]
            .map((item) => ({ ...item, days: getDaysUntil(getPaymentDate(item)) }))
            .filter(
              (item) =>
                item.status === "연체" ||
                (item.days !== null && item.days <= alertDays) ||
                (item.days !== null && item.days < 0 && Math.abs(item.days) > graceDays)
            )
            .sort((a, b) => (a.days ?? 9999) - (b.days ?? 9999));
        }, [items, settings.alertDaysBefore, settings.overdueGraceDays]);

        useEffect(() => {
          setCurrentPage(1);
        }, [search, statusFilter, entityFilter]);

        useEffect(() => {
          if (currentPage > totalPages) setCurrentPage(totalPages);
        }, [currentPage, totalPages]);

        const dataQuality = useMemo(() => {
          const duplicateMap = new Map();
          for (const item of items) {
            const key = [
              String(item.organization || "").trim().toLowerCase(),
              String(item.entity || "").trim().toLowerCase(),
              String(item.cycle || "").trim().toLowerCase(),
            ].join("|");
            if (!duplicateMap.has(key)) duplicateMap.set(key, []);
            duplicateMap.get(key).push(item);
          }
          const duplicates = [...duplicateMap.values()].filter((group) => group.length > 1);

          const categoryAverage = new Map();
          for (const item of items) {
            const cat = String(item.category || "");
            const prev = categoryAverage.get(cat) || { sum: 0, count: 0 };
            categoryAverage.set(cat, {
              sum: prev.sum + Number(item.amount || 0),
              count: prev.count + 1,
            });
          }
          const anomalies = items.filter((item) => {
            const stat = categoryAverage.get(String(item.category || ""));
            if (!stat || stat.count < 2) return false;
            const avg = stat.sum / stat.count;
            return avg > 0 && Number(item.amount || 0) > avg * 2;
          });

          return { duplicates, anomalies };
        }, [items]);

        const handleChange = (key, value) => {
          setForm((prev) => ({ ...prev, [key]: value }));
        };

        const resetForm = () => {
          setForm(emptyForm);
          setEditingId(null);
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!authUser) {
            alert("이메일 로그인 후 사용 가능합니다.");
            return;
          }
          if (!form.organization.trim() || !form.owner.trim() || !form.amount) {
            alert("기관명, 담당부서, 회비 금액은 필수입니다.");
            return;
          }

          const payload = {
            ...form,
            organization: form.organization.trim(),
            owner: form.owner.trim(),
            budgetCode: form.budgetCode.trim(),
            memo: form.memo.trim(),
            amount: Number(String(form.amount).replace(/,/g, "")) || 0,
            paymentDate: form.paymentDate || "",
            nextDueDate: form.paymentDate || "",
            lastPaidDate: form.status === "납부완료" ? form.paymentDate || "" : "",
          };
          const duplicateExists = items.some(
            (item) =>
              item.id !== editingId &&
              String(item.organization || "").trim().toLowerCase() === payload.organization.toLowerCase() &&
              String(item.entity || "").trim() === String(payload.entity || "").trim() &&
              String(item.cycle || "").trim() === String(payload.cycle || "").trim()
          );
          if (duplicateExists) {
            const proceed = confirm(
              "동일 기관/법인(사업장)/주기 항목이 이미 있습니다. 중복 등록 가능성이 높습니다. 계속 저장할까요?"
            );
            if (!proceed) return;
          }

          const sameCategoryItems = items.filter(
            (item) => item.id !== editingId && item.category === payload.category
          );
          const categoryAvg =
            sameCategoryItems.length > 0
              ? sameCategoryItems.reduce((sum, item) => sum + Number(item.amount || 0), 0) /
                sameCategoryItems.length
              : 0;
          if (categoryAvg > 0 && payload.amount > categoryAvg * 2) {
            const proceed = confirm(
              `입력 금액이 해당 구분 평균(${formatKRW(categoryAvg)}) 대비 크게 높습니다. 계속 저장할까요?`
            );
            if (!proceed) return;
          }

          const fb = window.FeeFirebase;

          try {
            if (isCloudConnected && fb?.db && fb?.methods) {
              const { db, methods } = fb;
              const { addDoc, updateDoc, doc, collection, serverTimestamp } = methods;

              if (editingId) {
                await updateDoc(doc(db, COLLECTION_NAME, editingId), {
                  ...payload,
                  updatedAt: serverTimestamp(),
                });
                await writeAuditLog("fee_updated", {
                  id: editingId,
                  organization: payload.organization,
                  entity: payload.entity,
                  cycle: payload.cycle,
                  amount: payload.amount,
                });
              } else {
                const created = await addDoc(collection(db, COLLECTION_NAME), {
                  ...payload,
                  createdAt: serverTimestamp(),
                  updatedAt: serverTimestamp(),
                });
                await writeAuditLog("fee_created", {
                  id: created.id,
                  organization: payload.organization,
                  entity: payload.entity,
                  cycle: payload.cycle,
                  amount: payload.amount,
                });
              }
            } else {
              if (editingId) {
                setItems((prev) =>
                  prev.map((item) => (item.id === editingId ? { ...item, ...payload } : item))
                );
              } else {
                setItems((prev) => [{ ...payload, id: crypto.randomUUID() }, ...prev]);
              }
            }
            resetForm();
          } catch (error) {
            console.error("저장 실패", error);
            alert("저장 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
          }
        };

        const handleEdit = (item) => {
          setEditingId(item.id);
          setForm({ ...item, amount: String(item.amount) });
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        const handleDelete = async (id) => {
          if (!authUser) {
            alert("이메일 로그인 후 사용 가능합니다.");
            return;
          }
          if (!confirm("해당 회비 항목을 삭제할까요?")) return;
          const target = items.find((item) => item.id === id);

          const fb = window.FeeFirebase;
          try {
            if (isCloudConnected && fb?.db && fb?.methods) {
              const { db, methods } = fb;
              await methods.deleteDoc(methods.doc(db, COLLECTION_NAME, id));
              await writeAuditLog("fee_deleted", {
                id,
                organization: target?.organization || "",
                entity: target?.entity || "",
                cycle: target?.cycle || "",
                amount: Number(target?.amount || 0),
              });
            } else {
              setItems((prev) => prev.filter((item) => item.id !== id));
            }
            if (editingId === id) resetForm();
          } catch (error) {
            console.error("삭제 실패", error);
            alert("삭제 중 오류가 발생했습니다.");
          }
        };

        const markAsPaid = async (id) => {
          if (!authUser) {
            alert("이메일 로그인 후 사용 가능합니다.");
            return;
          }
          const today = new Date().toISOString().slice(0, 10);
          const fb = window.FeeFirebase;
          const target = items.find((item) => item.id === id);

          try {
            if (isCloudConnected && fb?.db && fb?.methods) {
              const { db, methods } = fb;
              await methods.updateDoc(methods.doc(db, COLLECTION_NAME, id), {
                status: "납부완료",
                paymentDate: today,
                nextDueDate: today,
                lastPaidDate: today,
                updatedAt: methods.serverTimestamp(),
              });
              await writeAuditLog("fee_paid", {
                id,
                organization: target?.organization || "",
                paidDate: today,
                amount: Number(target?.amount || 0),
              });
            } else {
              setItems((prev) =>
                prev.map((item) =>
                  item.id === id
                    ? {
                        ...item,
                        status: "납부완료",
                        paymentDate: today,
                        nextDueDate: today,
                        lastPaidDate: today,
                      }
                    : item
                )
              );
            }
          } catch (error) {
            console.error("납부처리 실패", error);
            alert("납부처리 중 오류가 발생했습니다.");
          }
        };

        const exportXlsx = () => {
          if (!window.XLSX) {
            alert("XLSX 라이브러리 로딩에 실패했습니다.");
            return;
          }

          const rows = items.map((i) => ({
            기관명: i.organization,
            구분: i.category,
            "법인/사업장": i.entity,
            담당부서: i.owner,
            주기: i.cycle,
            금액: Number(i.amount || 0),
            납부일: getPaymentDate(i),
            지급수단: i.paymentMethod,
            예산코드: i.budgetCode,
            상태: i.status,
            자동갱신: i.autoRenew ? "Y" : "N",
            메모: i.memo,
          }));

          const worksheet = window.XLSX.utils.json_to_sheet(rows);
          const workbook = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(workbook, worksheet, "회비현황");
          window.XLSX.writeFile(workbook, `기업회비관리_${new Date().toISOString().slice(0, 10)}.xlsx`);
        };

        if (!authReady) {
          return (
            <main className="w-[min(520px,100%-24px)] mx-auto py-12">
              <section className="glass-card rounded-3xl shadow-soft p-6 text-center">
                <p className="text-sm text-slate-600">인증 상태 확인 중입니다...</p>
              </section>
            </main>
          );
        }

        if (!authUser) {
          return (
            <main className="w-[min(520px,100%-24px)] mx-auto py-10">
              <section className="glass-card rounded-3xl shadow-soft p-6 md:p-7 space-y-4 animate-reveal-up">
                <div>
                  <p className="text-xs text-brand-700 font-semibold tracking-wide uppercase">
                    Membership Fee Control Tower
                  </p>
                  <h1 className="text-2xl font-black text-slate-900 mt-1">
                    {isRegisterMode ? "이메일 계정 생성" : "이메일 로그인"}
                  </h1>
                  <p className="text-sm text-slate-600 mt-2">
                    회비 관리 시스템은 회사 계정으로 로그인하거나 계정을 생성해 이용할 수 있습니다.
                  </p>
                </div>

                <form onSubmit={handleLogin} className="space-y-3">
                  <label className="block">
                    <span className="block text-xs font-semibold text-slate-600 mb-1">이메일</span>
                    <input
                      type="email"
                      className="input-style"
                      value={loginEmail}
                      onChange={(e) => setLoginEmail(e.target.value)}
                      placeholder="name@company.com"
                    />
                  </label>
                  <label className="block">
                    <span className="block text-xs font-semibold text-slate-600 mb-1">비밀번호</span>
                    <input
                      type="password"
                      className="input-style"
                      value={loginPassword}
                      onChange={(e) => setLoginPassword(e.target.value)}
                      placeholder="비밀번호"
                    />
                  </label>
                  {isRegisterMode && (
                    <label className="block">
                      <span className="block text-xs font-semibold text-slate-600 mb-1">비밀번호 확인</span>
                      <input
                        type="password"
                        className="input-style"
                        value={loginPasswordConfirm}
                        onChange={(e) => setLoginPasswordConfirm(e.target.value)}
                        placeholder="비밀번호 확인"
                      />
                    </label>
                  )}
                  <label className="flex items-center gap-2 text-sm text-slate-600">
                    <input
                      type="checkbox"
                      checked={rememberEmail}
                      onChange={(e) => setRememberEmail(e.target.checked)}
                    />
                    계정 아이디 저장
                  </label>
                  {loginError && <p className="text-xs text-rose-600">{loginError}</p>}
                  <button
                    type="submit"
                    disabled={loginLoading}
                    className="w-full rounded-xl bg-brand-600 text-white py-2.5 text-sm font-semibold hover:bg-brand-700 disabled:opacity-60 transition"
                  >
                    {loginLoading ? (isRegisterMode ? "계정 생성 중..." : "로그인 중...") : isRegisterMode ? "계정 생성" : "로그인"}
                  </button>
                  <button
                    type="button"
                    onClick={() => {
                      setIsRegisterMode((prev) => !prev);
                      setLoginError("");
                      setLoginPassword("");
                      setLoginPasswordConfirm("");
                    }}
                    className="w-full rounded-xl border border-slate-200 bg-white py-2.5 text-sm font-semibold hover:bg-slate-50 transition"
                  >
                    {isRegisterMode ? "이미 계정이 있어요 (로그인)" : "처음 사용해요 (계정 생성)"}
                  </button>
                </form>
              </section>
            </main>
          );
        }

        if (!userProfileReady) {
          return (
            <main className="w-[min(520px,100%-24px)] mx-auto py-12">
              <section className="glass-card rounded-3xl shadow-soft p-6 text-center">
                <p className="text-sm text-slate-600">사용자 권한 정보를 확인 중입니다...</p>
              </section>
            </main>
          );
        }

        const isAdmin =
          String(authUser?.email || "").toLowerCase() === ADMIN_EMAIL || userProfile?.role === "admin";
        const isApproved = isAdmin || userProfile?.approved === true;

        if (!isApproved) {
          return (
            <main className="w-[min(560px,100%-24px)] mx-auto py-12">
              <section className="glass-card rounded-3xl shadow-soft p-6 md:p-7 space-y-4">
                <h2 className="text-2xl font-black text-slate-900">가입 승인 대기</h2>
                <p className="text-sm text-slate-600">
                  관리자 승인 후 시스템 이용이 가능합니다. 승인 담당자: {ADMIN_EMAIL}
                </p>
                <div className="rounded-xl bg-amber-50 border border-amber-200 px-3 py-2 text-xs text-amber-800">
                  현재 계정: {authUser?.email}
                </div>
                <button
                  onClick={handleLogout}
                  className="px-4 py-2.5 rounded-xl bg-rose-600 text-white text-sm font-semibold hover:bg-rose-700 transition"
                >
                  로그아웃
                </button>
              </section>
            </main>
          );
        }

        const entityOptions = Array.isArray(settings.entityOptions) && settings.entityOptions.length
          ? settings.entityOptions
          : defaultSettings.entityOptions;
        const uniqueEntities = ["전체", ...new Set([...entityOptions, ...items.map((i) => i.entity)])];
        const maxCategory = Math.max(...categorySummary.map(([, amount]) => amount), 1);
        const menuItems = [
          { key: "dashboard", label: "통합 대시보드", icon: "chart-line" },
          { key: "fees", label: "회비 등록/관리", icon: "table-list" },
          { key: "schedule", label: "납부 일정 관리", icon: "calendar-days" },
          { key: "risk", label: "연체/리스크", icon: "triangle-exclamation" },
          ...(isAdmin ? [{ key: "audit", label: "감사로그/검증", icon: "shield-halved" }] : []),
          ...(isAdmin ? [{ key: "settings", label: "환경설정", icon: "gear" }] : []),
        ];
        const upcomingItems = [...items]

                  <section className="space-y-4 animate-menu-in">
                    <Card title={`${scheduleYear} 연간 납부 캘린더`} subtitle="월별 납부 일정과 예상 금액">
                      <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-2.5">
                        {yearlyCalendar.map((m) => (
                          <div
                            key={m.month}
                            className={`rounded-xl border p-3 ${
                              m.month === new Date().getMonth() + 1
                                ? "border-brand-400 bg-brand-50"
                                : "border-slate-200 bg-white"
                            }`}
                          >
                            <div className="flex justify-between items-center">
                              <h4 className="text-sm font-bold text-slate-800">{m.label}</h4>
                              <span className="text-[11px] text-slate-500">{m.count}건</span>
                            </div>
                            <div className="w-full h-1.5 rounded-full bg-slate-100 mt-2 overflow-hidden">
                              <div
                                className="h-full rounded-full bg-gradient-to-r from-brand-500 to-accent-500"
                                style={{ width: `${(m.amount / maxCalendarAmount) * 100}%` }}
                              ></div>
                            </div>
                            <p className="text-xs text-slate-700 mt-2 font-semibold">{formatKRW(m.amount)}</p>
                            <p className="text-[11px] text-slate-500 mt-1">{m.sampleNames.join(", ") || "-"}</p>
                          </div>
                        ))}
                      </div>
                    </Card>
                    <Card title="납부 일정 상세" subtitle="다가오는 납부일과 지연 건을 통합 관리">
                      <div className="overflow-auto border border-slate-200 rounded-2xl max-h-[620px]">
                        <table className="w-full text-sm">
                          <thead className="sticky top-0 bg-slate-100 text-slate-700">
                            <tr>
                              <th className="px-3 py-2 text-left">기관</th>
                              <th className="px-3 py-2 text-left">담당부서</th>
                              <th className="px-3 py-2 text-left">납부일</th>
                              <th className="px-3 py-2 text-left">D-Day</th>
                              <th className="px-3 py-2 text-left">금액</th>
                              <th className="px-3 py-2 text-left">상태</th>
                            </tr>
                          </thead>
                          <tbody>
                            {upcomingItems.map((item) => (
                              <tr key={item.id} className="border-t border-slate-100 hover:bg-cyan-50/40">
                                <td className="px-3 py-2.5 font-semibold text-slate-800">{item.organization}</td>
                                <td className="px-3 py-2.5 text-slate-700">{item.owner}</td>
                                <td className="px-3 py-2.5">{formatDate(getPaymentDate(item))}</td>
                                <td className="px-3 py-2.5">
                                  {item.days >= 0 ? `D-${item.days}` : `${Math.abs(item.days)}일 지남`}
                                </td>
                                <td className="px-3 py-2.5">{formatKRW(item.amount)}</td>
                                <td className="px-3 py-2.5">
                                  <StatusBadge status={item.status} />
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </Card>
                  </section>
                )}

                {activeMenu === "risk" && (
                  <section className="grid grid-cols-1 lg:grid-cols-2 gap-4 animate-menu-in">
                    <Card title="연체/임박 리스크" subtitle={`알림기준 ${settings.alertDaysBefore}일, 유예 ${settings.overdueGraceDays}일`}>
                      <div className="space-y-2 max-h-[580px] overflow-auto pr-1">
                        {riskItems.length === 0 && <p className="text-sm text-slate-500">리스크 항목이 없습니다.</p>}
                        {riskItems.map((item) => (
                          <div
                            key={item.id}
                            className="rounded-xl border border-slate-200 bg-white p-3 flex items-start justify-between gap-3"
                          >
                            <div>
                              <p className="font-semibold text-sm text-slate-900">{item.organization}</p>
                              <p className="text-xs text-slate-500 mt-0.5">
                                {item.owner} · {formatKRW(item.amount)} · {formatDate(getPaymentDate(item))}
                              </p>
                            </div>
                            <button
                              onClick={() => markAsPaid(item.id)}
                              className="px-2 py-1 text-xs rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700"
                            >
                              납부처리
                            </button>
                          </div>
                        ))}
                      </div>
                    </Card>
                    <Card title="결재 대상 회비" subtitle="고액/정책기준 초과 항목">
                      <div className="space-y-2 max-h-[580px] overflow-auto pr-1">
                        {highAmountItems.length === 0 && <p className="text-sm text-slate-500">해당 항목이 없습니다.</p>}
                        {highAmountItems.map((item) => (
                          <div key={item.id} className="rounded-xl border border-slate-200 bg-white p-3">
                            <p className="text-sm font-semibold text-slate-900">{item.organization}</p>
                            <p className="text-xs text-slate-500 mt-1">{item.owner}</p>
                            <p className="text-xs text-slate-600 mt-1">{formatKRW(item.amount)}</p>
                          </div>
                        ))}
                      </div>
                    </Card>
                  </section>
                )}

                {activeMenu === "audit" && (
                  <section className="grid grid-cols-1 xl:grid-cols-[1fr_1.4fr] gap-4 animate-menu-in">
                    <Card title="데이터 검증 경고" subtitle="중복 등록 및 이상치 점검">
                      <div className="space-y-3">
                        <div className="p-3 rounded-xl border border-slate-200 bg-white">
                          <p className="text-sm font-semibold text-slate-900">
                            중복 후보: {dataQuality.duplicates.length}건
                          </p>
                          <div className="mt-2 space-y-2 max-h-[220px] overflow-auto">
                            {dataQuality.duplicates.length === 0 && (
                              <p className="text-xs text-slate-500">중복 패턴이 없습니다.</p>
                            )}
                            {dataQuality.duplicates.map((group, idx) => (
                              <div key={idx} className="text-xs text-slate-700 bg-slate-50 rounded-lg p-2">
                                {group[0]?.organization} · {group[0]?.entity} · {group[0]?.cycle} ({group.length}건)
                              </div>
                            ))}
                          </div>
                        </div>
                        <div className="p-3 rounded-xl border border-slate-200 bg-white">
                          <p className="text-sm font-semibold text-slate-900">
                            이상치 후보: {dataQuality.anomalies.length}건
                          </p>
                          <div className="mt-2 space-y-2 max-h-[220px] overflow-auto">
                            {dataQuality.anomalies.length === 0 && (
                              <p className="text-xs text-slate-500">이상치 패턴이 없습니다.</p>
                            )}
                            {dataQuality.anomalies.slice(0, 20).map((row) => (
                              <div key={row.id} className="text-xs text-slate-700 bg-slate-50 rounded-lg p-2">
                                {row.organization} · {row.category} · {formatKRW(row.amount)}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </Card>
                    <Card title="감사로그" subtitle="최근 변경 이력 (회비 모듈)">
                      <div className="overflow-auto border border-slate-200 rounded-2xl max-h-[620px]">
                        <table className="w-full text-sm">
                          <thead className="sticky top-0 bg-slate-100 text-slate-700">
                            <tr>
                              <th className="px-3 py-2 text-left">시간</th>
                              <th className="px-3 py-2 text-left">행위</th>
                              <th className="px-3 py-2 text-left">사용자</th>
                              <th className="px-3 py-2 text-left">대상</th>
                            </tr>
                          </thead>
                          <tbody>
                            {auditLogs.length === 0 && (
                              <tr>
                                <td colSpan="4" className="px-3 py-8 text-center text-slate-500">
                                  로그가 없습니다.
                                </td>
                              </tr>
                            )}
                            {auditLogs.map((log) => (
                              <tr key={log.id} className="border-t border-slate-100">
                                <td className="px-3 py-2.5 text-xs text-slate-600">
                                  {log.createdAt?.toDate
                                    ? log.createdAt.toDate().toLocaleString("ko-KR")
                                    : "-"}
                                </td>
                                <td className="px-3 py-2.5 text-xs font-semibold text-slate-800">{log.action}</td>
                                <td className="px-3 py-2.5 text-xs text-slate-700">
                                  {log.actorEmail || log.actorUid || "-"}
                                </td>
                                <td className="px-3 py-2.5 text-xs text-slate-700">
                                  {log.payload?.organization || log.payload?.userId || "-"}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </Card>
                  </section>
                )}

                {activeMenu === "settings" && (
                  <section className="grid grid-cols-1 xl:grid-cols-[1.2fr_1fr] gap-4 animate-menu-in">
                    <Card title="환경설정" subtitle="모든 사용자가 공유하는 공통 운영 설정">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <Field label="회사명">
                          <input
                            className="input-style"
                            value={settings.companyName}
                            onChange={(e) => handleSettingsChange("companyName", e.target.value)}
                          />
                        </Field>
                        <Field label="회비 관리자 이메일">
                          <input
                            className="input-style"
                            type="email"
                            value={settings.managerEmail}
                            onChange={(e) => handleSettingsChange("managerEmail", e.target.value)}
                          />
                        </Field>
                        <div className="md:col-span-2">
                          <Field label="법인/사업장 목록 (줄바꿈 또는 쉼표로 구분)">
                            <textarea
                              className="input-style min-h-[92px]"
                              value={entityOptionsInput}
                              onChange={(e) => setEntityOptionsInput(e.target.value)}
                              placeholder={"본사\n서울지사\n부산지사"}
                            />
                          </Field>
                        </div>
                        <Field label="회계 시작월">
                          <select
                            className="input-style"
                            value={settings.fiscalStartMonth}
                            onChange={(e) => handleSettingsChange("fiscalStartMonth", e.target.value)}
                          >
                            {Array.from({ length: 12 }, (_, i) => (
                              <option key={i + 1} value={String(i + 1)}>
                                {i + 1}월
                              </option>
                            ))}
                          </select>
                        </Field>
                        <Field label="사전 알림 일수">
                          <input
                            className="input-style"
                            type="number"
                            min="1"
                            value={settings.alertDaysBefore}
                            onChange={(e) => handleSettingsChange("alertDaysBefore", e.target.value)}
                          />
                        </Field>
                        <Field label="연체 유예 일수">
                          <input
                            className="input-style"
                            type="number"
                            min="0"
                            value={settings.overdueGraceDays}
                            onChange={(e) => handleSettingsChange("overdueGraceDays", e.target.value)}
                          />
                        </Field>
                        <Field label="결재 필요 기준금액">
                          <input
                            className="input-style"
                            type="number"
                            min="0"
                            value={settings.approvalRequiredAmount}
                            onChange={(e) => handleSettingsChange("approvalRequiredAmount", e.target.value)}
                          />
                        </Field>
                      </div>
                      <div className="mt-3 space-y-2">
                        <label className="flex items-center gap-2 text-sm text-slate-700">
                          <input
                            type="checkbox"
                            checked={settings.allowCsvExport}
                            onChange={(e) => handleSettingsChange("allowCsvExport", e.target.checked)}
                          />
                          XLSX 내보내기 허용
                        </label>
                      </div>
                      <div className="flex gap-2 mt-4">
                        <button
                          onClick={saveSettings}
                          disabled={settingsSaving}
                          className="px-4 py-2.5 rounded-xl bg-brand-600 text-white text-sm font-semibold hover:bg-brand-700 disabled:opacity-60"
                        >
                          {settingsSaving ? "저장 중..." : "설정 저장"}
                        </button>
                        <button
                          onClick={() => {
                            setSettings(defaultSettings);
                            setEntityOptionsInput((defaultSettings.entityOptions || []).join("\n"));
                          }}
                          className="px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm font-semibold hover:bg-slate-100"
                        >
                          기본값으로 초기화
                        </button>
                      </div>
                    </Card>
                    <div className="space-y-4">
                      <Card title="리스크 알림" subtitle="연체/임박 우선순위">
                        <div className="space-y-2 max-h-[280px] overflow-auto pr-1">
                          {riskItems.length === 0 && (
                            <p className="text-sm text-slate-500">현재 즉시 조치 대상이 없습니다.</p>
                          )}
                          {riskItems.slice(0, 10).map((item) => (
                            <div
                              key={item.id}
                              className="rounded-xl border border-slate-200 bg-white p-3 flex items-start justify-between gap-3"
                            >
                              <div>
                                <p className="font-semibold text-sm text-slate-900">{item.organization}</p>
                                <p className="text-xs text-slate-500 mt-0.5">
                                  {item.owner} · {formatKRW(item.amount)}
                                </p>
                              </div>
                              <span
                                className={`text-xs font-bold px-2 py-1 rounded-full ${
                                  item.status === "연체"
                                    ? "bg-rose-100 text-rose-700"
                                    : "bg-amber-100 text-amber-700"
                                }`}
                              >
                                {item.status === "연체" ? "연체" : `${item.days}일`}
                              </span>
                            </div>
                          ))}
                        </div>
                      </Card>
                      <Card title="운영 체크리스트" subtitle="회비 담당자 권장 프로세스">
                        <ul className="text-sm space-y-2 text-slate-700">
                          <li>1) 월초: 만기 {settings.alertDaysBefore}일 이내 항목 선공지</li>
                          <li>2) 납부 후: 상태/납부일/증빙 메모 즉시 업데이트</li>
                          <li>3) 분기말: 연체 사유와 실익을 검토해 유지 여부 재평가</li>
                          <li>4) 연말: 다음연도 예산 기준({formatKRW(settings.approvalRequiredAmount || 0)}) 재설정</li>
                        </ul>
                      </Card>
                      <Card title="신규 가입 승인 관리" subtitle="Admin 전용 사용자 승인">
                        <div className="space-y-2 max-h-[280px] overflow-auto pr-1">
                          {userAccounts.filter((u) => !u.approved).length === 0 && (
                            <p className="text-sm text-slate-500">승인 대기 계정이 없습니다.</p>
                          )}
                          {userAccounts
                            .filter((u) => !u.approved && String(u.email || "").toLowerCase() !== ADMIN_EMAIL)
                            .map((u) => (
                              <div
                                key={u.id}
                                className="p-3 rounded-xl border border-slate-200 bg-white flex items-center justify-between gap-3"
                              >
                                <div>
                                  <p className="text-sm font-semibold text-slate-900">{u.email || "(이메일 없음)"}</p>
                                  <p className="text-xs text-slate-500 mt-1">UID: {u.uid || u.id}</p>
                                </div>
                                <div className="flex gap-1.5">
                                  <button
                                    onClick={() => handleUserApproval(u.id, true)}
                                    className="px-2 py-1 text-xs rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
                                  >
                                    승인
                                  </button>
                                  <button
                                    onClick={() => handleUserApproval(u.id, false)}
                                    className="px-2 py-1 text-xs rounded-lg border border-rose-200 bg-rose-50 text-rose-700 hover:bg-rose-100"
                                  >
                                    반려
                                  </button>
                                </div>
                              </div>
                            ))}
                        </div>
                      </Card>
                      <Card title="설정 반영 범위" subtitle="회비 담당자 운영 기준">
                        <ul className="text-sm space-y-2 text-slate-700">
                          <li>1) 알림 일수: 대시보드 도래 건수와 리스크 항목 기준으로 사용</li>
                          <li>2) 유예 일수: 납부일 초과 항목의 경고 수준 판단에 반영</li>
                          <li>3) 결재 기준금액: 고액 회비 목록과 결재 검토 대상 생성</li>
                          <li>4) 법인/사업장 목록: 회비 등록 메뉴의 드롭다운 옵션으로 즉시 반영</li>
                          <li>5) 기능 제어: XLSX 내보내기 버튼 권한을 통합 제어</li>
                          <li>6) 저장 범위: 모든 로그인 사용자가 동일한 설정을 공유</li>
                          <li>7) 권한 정책: Admin 계정만 환경설정과 가입 승인을 처리</li>
                        </ul>
                      </Card>
                    </div>
                  </section>
                )}
              </div>
            </div>
          </main>
        );
      }

      function Card({ title, subtitle, children }) {
        return (
          <section className="glass-card rounded-3xl shadow-soft p-4 md:p-5 animate-reveal-up">
            <div className="mb-3 md:mb-4">
              <h2 className="text-lg md:text-xl font-bold text-slate-900">{title}</h2>
              {subtitle && <p className="text-xs md:text-sm text-slate-500 mt-1">{subtitle}</p>}
            </div>
            {children}
          </section>
        );
      }

      function Field({ label, children }) {
        return (
          <label className="block">
            <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>
            {children}
          </label>
        );
      }

      function KpiCard({ label, value, icon, tone, pulse = false }) {
        const tones = {
          brand: "from-cyan-600 to-sky-700",
          emerald: "from-emerald-500 to-teal-700",
          rose: "from-rose-500 to-red-700",
          amber: "from-amber-500 to-orange-700",
        };
        return (
          <div
            className={`rounded-2xl p-4 md:p-5 text-white bg-gradient-to-br ${tones[tone]} shadow-soft ${pulse ? "animate-pulse-soft" : ""}`}
          >
            <div className="flex items-start justify-between gap-3">
              <div>
                <p className="text-xs text-white/80 tracking-wide uppercase">{label}</p>
                <p className="text-2xl font-black mt-2 leading-tight">{value}</p>
              </div>
              <span className="w-10 h-10 rounded-xl bg-white/20 grid place-items-center">
                <i className={`fa-solid fa-${icon}`}></i>
              </span>
            </div>
          </div>
        );
      }

      function StatusBadge({ status }) {
        const map = {
          예정: "bg-sky-100 text-sky-700",
          납부완료: "bg-emerald-100 text-emerald-700",
          연체: "bg-rose-100 text-rose-700",
          검토중: "bg-amber-100 text-amber-700",
        };
        return (
          <span className={`inline-flex px-2.5 py-1 rounded-full text-xs font-bold ${map[status] || "bg-slate-100 text-slate-700"}`}>
            {status}
          </span>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
